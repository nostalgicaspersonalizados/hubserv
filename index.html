<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Hub - Profissional</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@latest/dist/bundle.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body id="main-body">

<div id="auth-screen">
    <div class="card" style="width: 350px; text-align: center; border: 1px solid #e2e8f0;">
        <h2 style="margin-bottom: 20px;">Nostálgicas Hub</h2>
        <input type="email" id="auth-email" placeholder="E-mail" style="margin-bottom:10px;">
        <input type="password" id="auth-senha" placeholder="Senha">
        <button class="btn" onclick="handleAuth('login')" style="margin-top:15px; width:100%">ENTRAR NO HUB</button>
        <p id="auth-msg" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<aside class="sidebar">
    <div class="logo">NOSTÁLGICAS</div>
    <button class="nav-item" onclick="tab('calc', this)">💰 Precificador</button>
    <button class="nav-item active" onclick="tab('prod', this)">🖨️ Estúdio Fotos</button>
    <button class="nav-item" onclick="tab('pdv', this)">🧾 PDV / Recibo</button>
    <button class="nav-item" onclick="tab('bg-rem', this)">✂️ Remover Fundo</button>
    <button class="nav-item" onclick="logout()" style="margin-top:auto; color:#f87171;">🚪 Sair</button>
</aside>

<main class="main">
    
    <div id="aba-prod" class="aba ativa">
        <div class="card">
            <h2>Estúdio de Montagem</h2>
            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <select id="p-modelo" onchange="limparEstudio()">
                    <option value="padrao">Polaroid (9,5x10)</option>
                    <option value="mini">Mini (7x9)</option>
                    <option value="instax">Instax (5,5x8)</option>
                    <option value="trio">Trio Cabine (5x15)</option>
                </select>
                <button class="btn" onclick="document.getElementById('f-in').click()">📂 Fotos</button>
                <button class="btn" style="background:var(--dark)" onclick="exportarPDF()">📄 Gerar PDF</button>
            </div>
            <input type="file" id="f-in" multiple hidden>
            
            <div id="p-folhas"></div>
        </div>
    </div>

    <div id="aba-calc" class="aba">
        <div class="card">
            <h2>💰 Calculadora de Custos</h2>
            <div style="display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px;">
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <div id="materiais-lista">
                        <label><strong>Materiais / Insumos</strong></label>
                        <div class="material-row" style="display: flex; gap: 5px; margin-bottom: 10px;">
                            <input type="text" placeholder="Papel, Tinta, Cola..." class="mat-nome">
                            <input type="number" placeholder="R$" class="mat-valor" style="width: 100px;">
                            <button class="btn" onclick="addMaterialField()" style="width: 45px; background: var(--dark)">+</button>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div><label>Custos Fixos (R$)</label><input type="number" id="calc-fixo" value="0"></div>
                        <div><label>Horas de Trabalho/Mês</label><input type="number" id="calc-horas-mes" value="160"></div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div><label>Margem de Lucro (%)</label><input type="number" id="calc-margem" value="100"></div>
                        <div><label>Taxas Cartão (%)</label><input type="number" id="calc-taxa" value="0"></div>
                    </div>

                    <div>
                        <label>Tempo de Produção (Horas e Minutos)</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="number" id="t-hh" placeholder="Horas" value="0">
                            <input type="number" id="t-mm" placeholder="Min" value="0">
                        </div>
                    </div>

                    <button class="btn" onclick="processarCalculo()" style="width: 100%; margin-top: 10px;">CALCULAR AGORA</button>
                </div>

                <div id="resultado-box" style="background:#f8fafc; padding:25px; border-radius:15px; border: 2px dashed #e2e8f0; text-align: center;">
                    <p style="font-size: 12px; font-weight: bold; color: #64748b;">PREÇO FINAL SUGERIDO</p>
                    <h1 id="preco-venda-final" style="color:var(--primary); font-size: 3rem; margin: 10px 0;">R$ 0,00</h1>
                    <div id="detalhes-final" style="font-size: 13px; text-align: left; color: #475569;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="aba-pdv" class="aba">
        <div class="card">
            <h2>🧾 Emissor de Recibo</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>Nome do Cliente</label>
                    <input type="text" id="pdv-cliente" placeholder="Ex: Maria Silva">
                    <div style="display: flex; gap: 5px; margin: 15px 0;">
                        <input type="text" id="pdv-item" placeholder="Produto">
                        <input type="number" id="pdv-valor" placeholder="R$" style="width: 90px;">
                        <button class="btn" onclick="adicionarItem()">+</button>
                    </div>
                    <button class="btn" style="background:var(--dark); width: 100%;" onclick="gerarReciboPDF()">GERAR RECIBO</button>
                </div>
                <div id="recibo-preview" style="background:white; border:1px solid #e2e8f0; padding:20px;">
                    <h4 style="text-align:center;">NOSTÁLGICAS PERSONALIZADOS</h4>
                    <p id="preview-cliente" style="font-size:12px; margin:10px 0;">Cliente: ---</p>
                    <table id="tabela-itens" style="width:100%; font-size:12px;">
                        <thead><tr style="border-bottom:1px solid #eee;"><th>Item</th><th>R$</th></tr></thead>
                        <tbody></tbody>
                    </table>
                    <p style="text-align:right; font-weight:bold; margin-top:10px;">Total: <span id="preview-total">R$ 0,00</span></p>
                </div>
            </div>
        </div>
    </div>

    <div id="aba-bg-rem" class="aba">
        <div class="card" style="text-align: center;">
            <h2>✂️ Remover Fundo</h2>
            <input type="file" id="f-remove" accept="image/*" hidden onchange="processarRemocao()">
            <button class="btn" onclick="document.getElementById('f-remove').click()">📂 Escolher Imagem</button>
            
            <div id="loading-remove" style="display:none; margin-top:20px;">
                <div class="spinner"></div><p>A IA está trabalhando...</p>
            </div>
            
            <div id="result-area" style="display:none; margin-top:20px;">
                <canvas id="canvas-remove" style="max-width: 100%; border-radius: 8px; background: url('https://www.transparenttextures.com/patterns/checkerboard.png');"></canvas>
                <br><button class="btn" style="background:var(--dark); margin-top:15px;" onclick="baixarImagemSemFundo()">BAIXAR PNG</button>
            </div>
        </div>
    </div>
</main>

<div id="editor-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000;">
    <div style="background:white; padding:20px; border-radius:12px; width:540px; margin: 40px auto; text-align:center;">
        <h3>Ajustar Foto</h3>
        <div id="crop-area" style="width:500px; height:500px; background:#eee; margin:15px auto; overflow:hidden; position:relative;">
            <img src="" id="crop-img" style="position:absolute;">
        </div>
        <input type="range" id="zoom-ctrl" min="0.1" max="3" step="0.01" value="0.8" style="width:100%;">
        <div style="display: flex; gap: 10px; margin-top:15px;">
            <button class="btn" style="background:#64748b; flex:1;" onclick="closeEditor()">CANCELAR</button>
            <button class="btn" style="flex:1;" onclick="saveCrop()">SALVAR</button>
        </div>
    </div>
</div>

<script src="estudio.js"></script>
<script src="precificador.js"></script>
<script src="pdv.js"></script>
<script src="bg-remover.js"></script>
<script type="module" src="auth.js"></script>

<script>
    // Função de navegação corrigida para ocultar tudo de verdade
    function tab(id, el) {
        document.querySelectorAll('.aba').forEach(aba => {
            aba.classList.remove('ativa');
            aba.style.display = 'none';
        });
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));

        const abaAlvo = document.getElementById('aba-' + id);
        if (abaAlvo) {
            abaAlvo.classList.add('ativa');
            abaAlvo.style.display = 'block';
        }
        if (el) el.classList.add('active');
    }
</script>

</body>
</html>
