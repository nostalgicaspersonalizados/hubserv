<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Hub Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { background-color: #0f172a !important; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .overlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-card { background: white; padding: 40px; border-radius: 16px; text-align: center; color: #333; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .auth-card input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-p { background: #6366f1; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .app-container { display: none; width: 100%; min-height: 100vh; }
        .ativa { display: block !important; }
        .tab { display: none; }
    </style>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div id="auth-overlay" class="overlay">
        <div class="auth-card">
            <h2 style="margin-bottom:10px">Nostálgicas Hub</h2>
            <form id="login-form" onsubmit="return false;">
                <input type="email" id="login-email" placeholder="E-mail" required autocomplete="username">
                <input type="password" id="login-pass" placeholder="Senha" required autocomplete="current-password">
                <button type="submit" id="btn-login" class="btn-p">ENTRAR</button>
            </form>
            <p id="auth-error" style="color:red; font-size:12px; margin-top:10px"></p>
        </div>
    </div>

    <div class="app-container" id="main-app">
        <aside class="sidebar" style="width: 250px; background: #1e293b; padding: 20px; position: fixed; height: 100vh;">
            <div class="brand" style="font-weight: 800; font-size: 20px; margin-bottom: 30px;">NOSTÁLGICAS <span style="color: #6366f1;">PRO</span></div>
            <div class="user-info" style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #334155;">
                <p id="user-name" style="margin: 0; font-size: 14px;">Carregando...</p>
                <span id="user-plan" style="background: #6366f1; font-size: 10px; padding: 2px 6px; border-radius: 4px;">FREE</span>
            </div>
            <nav style="display: flex; flex-direction: column; gap: 10px;">
                <button class="nav-item active" onclick="tab('dash')">📊 Dashboard</button>
                <button class="nav-item" onclick="tab('calc')">💰 Calculadora</button>
                <button class="nav-item" onclick="tab('fotos')">🖼️ Gerador Fotos</button>
                <button class="nav-item logout" id="btn-logout" style="margin-top: 20px; color: #ef4444;">Sair</button>
            </nav>
        </aside>

        <main class="main-content" style="margin-left: 250px; padding: 40px; width: calc(100% - 250px);">
            <section id="tab-dash" class="tab ativa">
                <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="stat-card" style="background: #1e293b; padding: 20px; border-radius: 12px;">
                        <h3>Pedidos</h3><h2 id="stat-pedidos">0</h2>
                    </div>
                    <div class="stat-card" style="background: #1e293b; padding: 20px; border-radius: 12px;">
                        <h3>Faturamento</h3><h2 id="stat-money">R$ 0,00</h2>
                    </div>
                </div>
            </section>

            <section id="tab-calc" class="tab">
                <div class="card" style="background: #1e293b; padding: 30px; border-radius: 12px;">
                    <div class="grid-form" style="display: flex; flex-direction: column; gap: 10px; max-width: 400px;">
                        <input type="number" id="c-unit" placeholder="Custo Material">
                        <input type="number" id="c-qtd" placeholder="Quantidade">
                        <input type="number" id="c-tempo" placeholder="Minutos de Produção">
                        <input type="number" id="c-hora" placeholder="Custo/Hora" value="20">
                        <input type="number" id="c-margem" placeholder="Margem %" value="100">
                        <button class="btn-p" id="btn-calc">Calcular Preço</button>
                    </div>
                    <div class="res-box" style="margin-top: 30px;">
                        <h1 id="res-total">R$ 0,00</h1>
                        <p id="res-lucro" style="color: #10b981;">Lucro: R$ 0,00</p>
                    </div>
                </div>
            </section>

            <section id="tab-fotos" class="tab">
                <div class="toolbar" style="margin-bottom: 20px; display: flex; gap: 10px;">
                    <select id="f-formato">
                        <option value="p-padrao">Polaroid (9.5x10)</option>
                        <option value="p-cabine">Cabine (5x15)</option>
                    </select>
                    <input type="file" id="f-in" multiple hidden>
                    <button class="btn-p" onclick="document.getElementById('f-in').click()">Subir Fotos</button>
                    <button class="btn-p" id="btn-pdf" style="background: #fbbf24; color: #000;">Baixar PDF (PRO)</button>
                </div>
                <div id="canvas-a4" style="background: white; width: 210mm; min-height: 297mm; padding: 10mm; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 5px;"></div>
            </section>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
