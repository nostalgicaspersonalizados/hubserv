<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Hub Pro</title>
    
    <style>
        body { background-color: #0f172a !important; color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .overlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-card { background: white; padding: 40px; border-radius: 16px; text-align: center; color: #333; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .auth-card input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-p { background: #6366f1; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .app-container { display: none; width: 100%; height: 100vh; flex-direction: row; }
    </style>

    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div id="auth-overlay" class="overlay">
        <div class="auth-card">
            <h2 style="margin-bottom:10px">Nostálgicas Hub</h2>
            <p style="font-size:14px; color:#666">Login Profissional</p>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button id="btn-login" class="btn-p">ENTRAR</button>
            <p id="auth-error" style="color:red; font-size:12px; margin-top:10px"></p>
        </div>
    </div>

    <div class="app-container">
        </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="estilo.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

   <div id="auth-overlay" class="overlay">
    <div class="auth-card">
    <h2>Nostálgicas Hub</h2>
    <form id="login-form" onsubmit="return false;">
        <input type="email" id="login-email" placeholder="E-mail" required autocomplete="username">
        <input type="password" id="login-pass" placeholder="Senha" required autocomplete="current-password">
        <button type="submit" id="btn-login" class="btn-p">ENTRAR</button>
    </form>
    <p id="auth-error" style="color:red; font-size:12px; margin-top:10px"></p>
</div>
       
   </div>
    
    <div class="app-container" style="display:none;">
        <aside class="sidebar">
            <div class="brand">NOSTÁLGICAS <span>PRO</span></div>
            <div class="user-info">
                <p id="user-name">Carregando...</p>
                <span id="user-plan" class="badge">FREE</span>
            </div>
            <nav>
                <button class="nav-item active" onclick="tab('dash')">📊 Dashboard</button>
                <button class="nav-item" onclick="tab('calc')">💰 Calculadora</button>
                <button class="nav-item" onclick="tab('fotos')">🖼️ Gerador Fotos</button>
                <button class="nav-item" onclick="tab('pdv')">🧾 PDV / Pedidos</button>
                <button class="nav-item logout" id="btn-logout">Sair</button>
            </nav>
        </aside>

        <main class="main-content">
            <section id="tab-dash" class="tab ativa">
                <div class="stats-grid">
                    <div class="stat-card"><h3>Pedidos</h3><h2 id="stat-pedidos">0</h2></div>
                    <div class="stat-card"><h3>Faturamento</h3><h2 id="stat-money">R$ 0,00</h2></div>
                </div>
            </section>

            <section id="tab-calc" class="tab">
                <div class="card">
                    <div class="grid-form">
                        <input type="number" id="c-unit" placeholder="Custo Material">
                        <input type="number" id="c-qtd" placeholder="Quantidade">
                        <input type="number" id="c-tempo" placeholder="Minutos">
                        <input type="number" id="c-hora" placeholder="Custo/Hora" value="20">
                        <input type="number" id="c-margem" placeholder="Margem %" value="100">
                        <button class="btn-p" id="btn-calc">Calcular Preço</button>
                    </div>
                    <div class="res-box">
                        <h1 id="res-total">R$ 0,00</h1>
                        <p id="res-lucro">Lucro: R$ 0,00</p>
                    </div>
                </div>
            </section>

            <section id="tab-fotos" class="tab">
                <div class="toolbar">
                    <select id="f-formato">
                        <option value="p-padrao">Polaroid (9.5x10)</option>
                        <option value="p-cabine">Cabine (5x15)</option>
                    </select>
                    <input type="file" id="f-in" multiple hidden>
                    <button class="btn-s" onclick="document.getElementById('f-in').click()">Subir Fotos</button>
                    <button class="btn-p" id="btn-pdf">Baixar PDF (PRO)</button>
                </div>
                <div id="canvas-a4" class="folha-a4"></div>
            </section>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
