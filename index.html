<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Hub | Oficial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@latest/dist/bundle.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="brand">NOSTÁLGICAS</div>
        <nav>
            <button class="nav-btn active" onclick="showTab('calc')">💰 Calculadora</button>
            <button class="nav-btn" onclick="showTab('fotos')">🖼️ Gerador Fotos</button>
            <button class="nav-btn" onclick="showTab('pdv')">🧾 PDV / Recibo</button>
            <button class="nav-btn" onclick="showTab('bg')">✂️ Remover Fundo</button>
        </nav>
    </aside>

    <main class="content">
        <section id="tab-calc" class="tab-content active">
            <div class="card">
                <h2>💰 Precificação de Produtos</h2>
                <div class="grid-2">
                    <div class="form">
                        <label>Custo Unitário (R$)</label><input type="number" id="c-unit" value="0">
                        <label>Quantidade</label><input type="number" id="c-qtd" value="1">
                        <label>Tempo (Minutos)</label><input type="number" id="c-tempo" value="10">
                        <label>Margem Lucro (%)</label><input type="number" id="c-margem" value="100">
                        <button class="btn-p" onclick="calcularPreco()">CALCULAR</button>
                    </div>
                    <div class="res-display">
                        <p>PREÇO FINAL</p>
                        <h1 id="res-total">R$ 0,00</h1>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-fotos" class="tab-content">
            <div class="card">
                <div class="controls">
                    <select id="f-formato" onchange="mudarMolde()">
                        <option value="p-padrao">Polaroid Padrão</option>
                        <option value="p-instax">Instax</option>
                        <option value="p-cabine">Cabine (5x15)</option>
                    </select>
                    <input type="file" id="f-input" hidden>
                    <button class="btn-s" onclick="document.getElementById('f-input').click()">📂 Subir Imagem</button>
                    <button class="btn-p" onclick="baixarPNG()">📥 Baixar PNG</button>
                </div>
                <div id="print-area">
                    <div id="molde" class="p-padrao">
                        <div class="photo-box"><img id="main-img" src=""></div>
                        <div id="cabine-extra" style="display:none">
                            <div class="photo-box"><img class="clone" src=""></div>
                            <div class="photo-box"><img class="clone" src=""></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-pdv" class="tab-content">
            <div class="card">
                <input type="text" id="r-cli" placeholder="Nome do Cliente">
                <input type="text" id="r-item" placeholder="Produto">
                <input type="number" id="r-val" placeholder="Valor R$">
                <button class="btn-p" onclick="gerarRecibo()">GERAR RECIBO</button>
                <div id="recibo-view" style="margin-top:20px; border:1px solid #eee; padding:20px;">
                    <h3>NOSTÁLGICAS HUB</h3>
                    <p id="v-txt">Aguardando dados...</p>
                </div>
            </div>
        </section>

        <section id="tab-bg" class="tab-content">
            <div class="card">
                <input type="file" id="bg-in" hidden>
                <button class="btn-p" onclick="document.getElementById('bg-in').click()">Remover Fundo IA</button>
                <div id="bg-status"></div>
                <canvas id="bg-canvas" style="max-width:100%; margin-top:20px;"></canvas>
            </div>
        </section>
    </main>
<script src="precessor.js"></script>
    <script src="estudio.js"></script>
    <script src="pdv.js"></script>
    <script src="bg-remover.js"></script>
    <script type="module" src="auth.js"></script>
    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
