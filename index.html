<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Hub Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #e11d48; --dark: #0f172a; --accent: #fbbf24; --bg: #f1f5f9; }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; font-family: 'Inter', sans-serif; }
        
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* Navegação */
        .sidebar { width: 70px; background: var(--dark); display: flex; flex-direction: column; align-items: center; padding-top: 20px; transition: 0.3s; z-index: 1000; }
        .sidebar:hover { width: 200px; }
        .nav-item { color: #94a3b8; padding: 18px; cursor: pointer; width: 100%; border: none; background: none; display: flex; align-items: center; gap: 20px; transition: 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: var(--primary); color: #fff; }
        .nav-item span { opacity: 0; white-space: nowrap; font-weight: 600; }
        .sidebar:hover span { opacity: 1; }

        /* Área Principal */
        .main { flex: 1; overflow-y: auto; padding: 25px; scroll-behavior: smooth; }
        .aba { display: none; max-width: 1200px; margin: auto; animation: fadeIn 0.3s ease; }
        .aba.ativa { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Pro */
        .card { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h2 { margin-top: 0; font-weight: 900; color: var(--dark); font-size: 1.5rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        
        input, select { 
            width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; 
            background: #f8fafc; transition: 0.2s; font-size: 14px;
        }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }

        .btn { 
            background: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 10px; 
            cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(225, 29, 72, 0.3); }

        /* Estúdio */
        #p-folhas { display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .folha-a4 { width: 210mm; height: 297mm; background: #fff; padding: 10mm; display: grid; gap: 4mm; box-shadow: 0 0 30px rgba(0,0,0,0.1); position: relative; }
        .mini-polaroid { border: 0.2mm solid #f1f5f9; position: relative; overflow: visible; background: #fff; }
        .foto-box { width: 100%; height: 100%; overflow: hidden; position: relative; background: #000; }
        .foto-box img { position: absolute; transform-origin: center; cursor: move; user-select: none; }
        
        .btn-girar { 
            position: absolute; top: -10px; right: -10px; z-index: 50; 
            background: var(--dark); color: #fff; border-radius: 50%; width: 28px; height: 28px;
            border: 2px solid #fff; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center;
        }

        /* Formatos */
        .f-padrao { width: 95mm; height: 105mm; padding: 5mm 5mm 15mm 5mm; }
        .f-mini { width: 70mm; height: 90mm; padding: 4mm 4mm 12mm 4mm; }
        .f-instax { width: 55mm; height: 80mm; padding: 3mm 3mm 10mm 3mm; }
        .f-padrao-grid { grid-template-columns: repeat(2, 95mm); }
        .f-mini-grid { grid-template-columns: repeat(2, 70mm); }
        .f-instax-grid { grid-template-columns: repeat(3, 55mm); }

        /* Impressão Recibo */
        @media print {
            body * { display: none !important; }
            #area-recibo, #area-recibo * { display: block !important; }
            #area-recibo { position: absolute; left: 0; top: 0; width: 80mm; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="nav-item active" onclick="tab('calc', this)">💰 <span>Precificador</span></div>
    <div class="nav-item" onclick="tab('prod', this)">🖨️ <span>Produção</span></div>
    <div class="nav-item" onclick="tab('pdv', this)">🧾 <span>PDV / Recibo</span></div>
</nav>

<main class="main">
    <div id="aba-calc" class="aba ativa">
    <div class="card">
        <h2>💰 Inteligência de Preços</h2>
        
        <div class="grid">
            <div class="field"><label>Custos Fixos Mensais</label><input type="number" id="c-fixo" value="500" oninput="runCalc()"></div>
            <div class="field"><label>Meta Pró-Labore</label><input type="number" id="c-meta" value="3000" oninput="runCalc()"></div>
            <div class="field"><label>Horas Úteis/Mês</label><input type="number" id="c-hrs" value="160" oninput="runCalc()"></div>
        </div>

        <div class="section" style="background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0;">
            <label style="margin-bottom: 15px; display: block;">Materiais e Insumos (por unidade)</label>
            <div id="lista-materiais">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" placeholder="Ex: Papel Fotográfico" style="flex: 2;">
                    <input type="number" class="mat-custo" value="0.85" oninput="runCalc()" style="flex: 1;" placeholder="R$">
                    <button onclick="this.parentElement.remove(); runCalc()" style="background:none; border:none; color:red; cursor:pointer;">✕</button>
                </div>
            </div>
            <button class="btn" onclick="addMaterialField()" style="padding: 8px 15px; font-size: 12px; background: #64748b;">+ Adicionar Material</button>
        </div>

        <div class="grid">
            <div class="field"><label>Minutos de Produção</label><input type="number" id="c-tempo" value="15" oninput="runCalc()"></div>
            <div class="field"><label>Margem de Lucro %</label><input type="number" id="c-lucro" value="100" oninput="runCalc()"></div>
            <div class="field"><label>Taxas/Cartão %</label><input type="number" id="c-taxa" value="0" oninput="runCalc()"></div>
        </div>

        <div style="background: var(--dark); padding: 30px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; color: #fff;">
            <div>
                <div id="res-venda" style="font-size: 2.5rem; font-weight: 900; color: var(--accent);">R$ 0,00</div>
                <span style="opacity: 0.6; font-size: 12px; text-transform: uppercase;">Preço de Venda Sugerido</span>
            </div>
            <div style="text-align: right;">
                <div id="res-custo" style="font-size: 1.2rem; font-weight: 600;">R$ 0,00</div>
                <span style="opacity: 0.6; font-size: 12px;">Custo Total da Peça</span>
            </div>
        </div>
    </div>
</div>

<script>
    // --- FUNÇÕES DO NOVO PRECIFICADOR ---
    
    function addMaterialField() {
        const container = document.getElementById('lista-materiais');
        const div = document.createElement('div');
        div.style = "display: flex; gap: 10px; margin-bottom: 10px;";
        div.innerHTML = `
            <input type="text" placeholder="Novo material" style="flex: 2;">
            <input type="number" class="mat-custo" value="0" oninput="runCalc()" style="flex: 1;" placeholder="R$">
            <button onclick="this.parentElement.remove(); runCalc()" style="background:none; border:none; color:red; cursor:pointer;">✕</button>
        `;
        container.appendChild(div);
    }

    function runCalc() {
        // Custos Estruturais
        const f = parseFloat(document.getElementById('c-fixo').value) || 0;
        const m = parseFloat(document.getElementById('c-meta').value) || 0;
        const h = parseFloat(document.getElementById('c-hrs').value) || 1;
        
        // Soma de todos os materiais na lista
        let totalMat = 0;
        document.querySelectorAll('.mat-custo').forEach(input => {
            totalMat += parseFloat(input.value) || 0;
        });

        const t = parseFloat(document.getElementById('c-tempo').value) || 0;
        const lucroPorcento = parseFloat(document.getElementById('c-lucro').value) || 0;
        const taxaPorcento = parseFloat(document.getElementById('c-taxa').value) || 0;

        // Valor da Hora
        const valorHora = (f + m) / h;
        
        // Custo de Produção (Material + Tempo de Mão de Obra)
        const custoProducao = totalMat + ((t / 60) * valorHora);
        
        // Cálculo de Venda com Markup e Markup Divisor para taxas
        // Preço = Custo + Lucro + Taxas
        let precoVenda = custoProducao * (1 + (lucroPorcento / 100));
        
        // Aplicar taxas sobre o valor final (opcional, mas comum em comércio)
        if(taxaPorcento > 0) {
            precoVenda = precoVenda / (1 - (taxaPorcento / 100));
        }

        document.getElementById('res-custo').innerText = custoProducao.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
        document.getElementById('res-venda').innerText = precoVenda.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
    }
    
    // Inicializa o cálculo ao abrir
    window.onload = runCalc;
</script>

    <div id="aba-prod" class="aba">
        <div class="card">
            <h2>🖨️ Estúdio de Montagem</h2>
            <div class="grid" style="align-items: flex-end;">
                <div class="field">
                    <label>Formato da Polaroid</label>
                    <select id="p-formato" onchange="limparEstudio()">
                        <option value="padrao">Padrão (9.5 x 10.5)</option>
                        <option value="mini">Mini (7 x 9)</option>
                        <option value="instax">Instax (5.5 x 8)</option>
                    </select>
                </div>
                <button class="btn" onclick="document.getElementById('file-in').click()">📂 CARREGAR FOTOS</button>
                <button class="btn" style="background: var(--dark);" onclick="gerarPDF()">📄 EXPORTAR PDF</button>
            </div>
            <input type="file" id="file-in" multiple hidden onchange="handleFiles(this)">
        </div>
        <div id="p-folhas"></div>
    </div>

    <div id="aba-pdv" class="aba">
        <div class="card">
            <h2>🧾 Frente de Caixa</h2>
            <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px;">
                <div>
                    <label>Novo Item</label>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <input type="text" id="i-nome" placeholder="Nome do Produto">
                        <input type="number" id="i-valor" placeholder="R$ 0,00" style="width: 150px;">
                        <button class="btn" onclick="addItem()">➕</button>
                    </div>
                    <div id="pdv-tabela" style="margin-top: 20px; border: 1px solid #f1f5f9; border-radius: 10px;">
                        </div>
                </div>
                <div style="background: #f8fafc; padding: 25px; border-radius: 15px; border: 1px solid #e2e8f0;">
                    <label>Dados do Cliente</label>
                    <input type="text" id="pdv-cliente" placeholder="Nome Completo" style="margin: 10px 0 20px 0;">
                    <small>TOTAL A PAGAR</small>
                    <div id="pdv-total" style="font-size: 2.5rem; font-weight: 900; color: var(--primary); margin-bottom: 20px;">R$ 0,00</div>
                    <button class="btn" style="width: 100%; background: #059669;" onclick="printRecibo()">🖨️ EMITIR RECIBO</button>
                    <button class="btn" style="width: 100%; background: #94a3b8; margin-top: 10px;" onclick="resetPDV()">🗑️ LIMPAR</button>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    let STATE = { fotos: {}, carrinho: [] };

    // Navegação Segura
    function tab(id, el) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('ativa');
        el.classList.add('active');
    }

    // --- LÓGICA: PRECIFICADOR ---
    function runCalc() {
        const f = parseFloat(document.getElementById('c-fixo').value) || 0;
        const m = parseFloat(document.getElementById('c-meta').value) || 0;
        const h = parseFloat(document.getElementById('c-hrs').value) || 1;
        const mat = parseFloat(document.getElementById('c-mat').value) || 0;
        const t = parseFloat(document.getElementById('c-tempo').value) || 0;
        const l = parseFloat(document.getElementById('c-lucro').value) / 100;

        const vh = (f + m) / h;
        const custo = mat + ((t / 60) * vh);
        const venda = custo * (1 + l);

        document.getElementById('res-custo').innerText = custo.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
        document.getElementById('res-venda').innerText = venda.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
        
        localStorage.setItem('nostalgicas_fixo', f); // Salva preferência
    }

    // --- LÓGICA: PRODUÇÃO ---
    function handleFiles(input) {
        const fmt = document.getElementById('p-formato').value;
        const lim = { padrao: 4, mini: 6, instax: 9 }[fmt];
        
        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => createCard(e.target.result, fmt, lim);
            reader.readAsDataURL(file);
        });
    }

    function createCard(src, fmt, lim) {
        const container = document.getElementById('p-folhas');
        let folha = container.lastElementChild;
        
        if (!folha || folha.querySelectorAll('.mini-polaroid').length >= lim) {
            folha = document.createElement('div');
            folha.className = `folha-a4 f-${fmt}-grid`;
            container.appendChild(folha);
        }

        const id = 'img_' + Math.random().toString(36).substr(2, 9);
        const card = document.createElement('div');
        card.className = `mini-polaroid f-${fmt}`;
        card.innerHTML = `<button class="btn-girar" onclick="rotate('${id}')">🔄</button><div class="foto-box"><img src="${src}" id="${id}"></div>`;
        folha.appendChild(card);
        
        setupImg(card.querySelector('img'), id);
    }

    function setupImg(img, id) {
        STATE.fotos[id] = { x: 0, y: 0, s: 1.1, r: 0 };
        const box = img.parentElement;

        box.onwheel = (e) => {
            e.preventDefault();
            STATE.fotos[id].s += e.deltaY > 0 ? -0.05 : 0.05;
            apply(img, id);
        };

        let isDown = false, startX, startY;
        box.onmousedown = (e) => { 
            isDown = true; 
            startX = e.clientX - STATE.fotos[id].x; 
            startY = e.clientY - STATE.fotos[id].y; 
        };
        window.onmousemove = (e) => {
            if (!isDown) return;
            STATE.fotos[id].x = e.clientX - startX;
            STATE.fotos[id].y = e.clientY - startY;
            apply(img, id);
        };
        window.onmouseup = () => isDown = false;
    }

    function rotate(id) {
        STATE.fotos[id].r = (STATE.fotos[id].r + 90) % 360;
        apply(document.getElementById(id), id);
    }

    function apply(img, id) {
        img.style.transform = `translate(${STATE.fotos[id].x}px, ${STATE.fotos[id].y}px) scale(${STATE.fotos[id].s}) rotate(${STATE.fotos[id].r}deg)`;
    }

    async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const folhas = document.querySelectorAll('.folha-a4');
        
        for (let i = 0; i < folhas.length; i++) {
            if (i > 0) pdf.addPage();
            const canvas = await html2canvas(folhas[i], { scale: 2, useCORS: true });
            pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 210, 297);
        }
        pdf.save('Producao_Nostalgicas.pdf');
    }

    function limparEstudio() { document.getElementById('p-folhas').innerHTML = ''; }

    // --- LÓGICA: PDV ---
    function addItem() {
        const n = document.getElementById('i-nome').value;
        const v = parseFloat(document.getElementById('i-valor').value);
        if (!n || isNaN(v)) return alert("Dados inválidos");
        
        STATE.carrinho.push({ n, v });
        document.getElementById('i-nome').value = '';
        document.getElementById('i-valor').value = '';
        renderPDV();
    }

    function renderPDV() {
        const container = document.getElementById('pdv-tabela');
        container.innerHTML = '';
        let total = 0;

        STATE.carrinho.forEach((item, index) => {
            total += item.v;
            container.innerHTML += `
                <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #f1f5f9; align-items:center;">
                    <span style="font-weight:600">${item.n}</span>
                    <span>R$ ${item.v.toFixed(2)} <button onclick="removeItem(${index})" style="background:none; border:none; color:red; cursor:pointer; margin-left:10px;">✕</button></span>
                </div>
            `;
        });
        document.getElementById('pdv-total').innerText = total.toLocaleString('pt-br', {style:'currency', currency:'BRL'});
    }

    function removeItem(idx) { STATE.carrinho.splice(idx, 1); renderPDV(); }
    function resetPDV() { STATE.carrinho = []; renderPDV(); document.getElementById('pdv-cliente').value = ''; }

    function printRecibo() {
        if (STATE.carrinho.length === 0) return;
        const cli = document.getElementById('pdv-cliente').value || "Cliente Geral";
        const total = document.getElementById('pdv-total').innerText;
        
        const div = document.createElement('div');
        div.id = 'area-recibo';
        div.innerHTML = `
            <div style="font-family:monospace; width:80mm; padding:10px;">
                <center><h2>NOSTÁLGICAS</h2><p>Personalizados</p><hr></center>
                <p>CLIENTE: ${cli.toUpperCase()}<br>DATA: ${new Date().toLocaleDateString()}</p><hr>
                ${STATE.carrinho.map(i => `<div style="display:flex; justify-content:space-between"><span>${i.n}</span><span>R$ ${i.v.toFixed(2)}</span></div>`).join('')}
                <hr><div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.2em"><span>TOTAL</span><span>${total}</span></div>
                <center><br><p>Obrigado pela preferência!</p><p>@nostalgicas_personalizados</p></center>
            </div>
        `;
        document.body.appendChild(div);
        window.print();
        document.body.removeChild(div);
    }

    runCalc();
</script>
</body>
</html>
