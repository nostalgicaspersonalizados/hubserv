<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Hub Pro - Gestão Gráfica</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-overlay" class="overlay">
    </div>

<main id="app-content" style="display: none;">
    </main>
            <div class="auth-logo">NOSTÁLGICAS <span>HUB PRO</span></div>
            <p>Acesse sua plataforma profissional</p>
            <div id="login-area">
                <input type="email" id="login-email" placeholder="Seu e-mail profissional">
                <input type="password" id="login-pass" placeholder="Sua senha">
                <button id="btn-login" class="btn-main">Entrar no Sistema</button>
                <div class="divider"><span>OU</span></div>
                <button id="btn-google" class="btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="Google">
                    Entrar com Google
                </button>
            </div>
        </div>
    </div>

    <div id="app-content" class="app-grid" style="display: none;">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo-text">HUB PRO</span>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" onclick="tab('dash')"><i class="fas fa-chart-line"></i> Dashboard</button>
                <button class="nav-item" onclick="tab('calc')"><i class="fas fa-calculator"></i> Calculadora</button>
                <button class="nav-item" onclick="tab('fotos')"><i class="fas fa-print"></i> Gerador A4</button>
                <button class="nav-item" onclick="tab('pdv')"><i class="fas fa-cash-register"></i> PDV / Vendas</button>
                <button class="nav-item pro-only" onclick="tab('bg')"><i class="fas fa-magic"></i> Remover Fundo</button>
            </nav>
            <div class="sidebar-footer">
                <div id="user-info">
                    <span id="user-name">...</span>
                    <span id="user-plan" class="badge-free">FREE</span>
                </div>
                <button id="btn-logout" class="btn-exit"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </aside>

        <main class="main-viewport">
            
            <section id="tab-calc" class="tab-content">
                <div class="section-header">
                    <h2>Calculadora de Precificação</h2>
                    <p>Defina preços que garantam seu lucro real.</p>
                </div>

                <div class="calc-container">
                    <div class="calc-form card">
                        <div class="input-group full">
                            <label>Nome do Projeto / Produto</label>
                            <input type="text" id="c-nome-projeto" placeholder="Ex: Caneca Dia dos Pais">
                        </div>
                        
                        <div class="form-row">
                            <div class="input-group">
                                <label>Custo Unitário (Matéria-prima)</label>
                                <input type="number" id="c-unit" step="0.01" placeholder="0,00">
                            </div>
                            <div class="input-group">
                                <label>Quantidade</label>
                                <input type="number" id="c-qtd" value="1">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="input-group">
                                <label>Tempo de Produção (Minutos)</label>
                                <input type="number" id="c-tempo" placeholder="Ex: 15">
                            </div>
                            <div class="input-group">
                                <label>Valor da sua Hora R$</label>
                                <input type="number" id="c-hora" value="20">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="input-group">
                                <label>Custo de Energia/Fixo R$</label>
                                <input type="number" id="c-energia" step="0.01" value="0.50">
                            </div>
                            <div class="input-group">
                                <label>Material Extra/Embalagem R$</label>
                                <input type="number" id="c-extra" step="0.01" value="0">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="input-group">
                                <label>Margem de Lucro Desejada (%)</label>
                                <input type="number" id="c-margem" value="100">
                            </div>
                            <div class="input-group">
                                <label>Taxa de Cartão (%)</label>
                                <input type="number" id="c-taxa" value="4.99">
                            </div>
                        </div>

                        <div class="input-group full">
                            <label>Desconto Especial R$</label>
                            <input type="number" id="c-desconto" value="0" step="0.01">
                        </div>

                        <button id="btn-calc" class="btn-action">Calcular Preço Final</button>
                    </div>

                    <div class="calc-result-area card">
                        <h3>Resumo Financeiro</h3>
                        <div class="result-box">
                            <span class="label">Preço Sugerido (Unidade)</span>
                            <h2 id="res-total">R$ 0,00</h2>
                        </div>
                        <div class="result-details">
                            <p id="res-lucro">Lucro Real: R$ 0,00</p>
                        </div>
                        <button id="btn-save-calc" class="btn-secundary pro-only">Salvar no Firebase</button>
                    </div>
                </div>
            </section>

            <section id="tab-pdv" class="tab-content">
                <div class="section-header">
                    <h2>PDV - Registrar Pedido</h2>
                </div>
                <div class="pdv-grid">
                    <div class="pdv-form card">
                        <label>Cliente</label>
                        <input type="text" id="p-cliente-nome" placeholder="Nome do cliente">
                        <input type="text" id="p-cliente-contato" placeholder="WhatsApp">
                        
                        <hr>
                        
                        <label>Adicionar Item ao Pedido</label>
                        <input type="text" id="p-item-nome" placeholder="Produto">
                        <input type="number" id="p-item-valor" placeholder="Valor R$">
                        <button id="btn-add-item" class="btn-secundary">Adicionar ao Carrinho</button>
                    </div>

                    <div class="pdv-cart card">
                        <h3>Carrinho de Compras</h3>
                        <div id="pdv-lista-itens" class="cart-items">
                            </div>
                        <div class="cart-footer">
                            <div class="total-row">
                                <span>Total:</span>
                                <strong id="cart-total">R$ 0,00</strong>
                            </div>
                            <select id="p-metodo-pagamento">
                                <option value="pix">PIX</option>
                                <option value="cartao">Cartão de Crédito</option>
                                <option value="dinheiro">Dinheiro</option>
                            </select>
                            <select id="p-status-pagamento">
                                <option value="pago">Já Pago</option>
                                <option value="pendente">Pendente</option>
                            </select>
                            <button id="btn-finish-sale" class="btn-action">Finalizar e Salvar</button>
                        </div>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
