<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Hub | Oficial</title>

    <!-- LIBS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@latest/dist/bundle.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="estilo.css">

    <!-- FONTE -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="brand">NOSTÁLGICAS</div>

    <nav>
        <button class="nav-btn active" onclick="showTab(event,'calc')">💰 Calculadora</button>
        <button class="nav-btn" onclick="showTab(event,'fotos')">🖼️ Gerador Fotos</button>
        <button class="nav-btn" onclick="showTab(event,'pdv')">🧾 PDV / Recibo</button>
        <button class="nav-btn" onclick="showTab(event,'bg')">✂️ Remover Fundo</button>
    </nav>
</aside>

<!-- CONTEÚDO -->
<main class="content">

    <!-- CALCULADORA -->
    <section id="tab-calc" class="tab-content active">
        <div class="card">
            <h2>💰 Precificação</h2>

            <div class="grid-2">
                <div class="form">

                    <label>Custo Unitário</label>
                    <input type="number" id="c-unit">

                    <label>Quantidade</label>
                    <input type="number" id="c-qtd" value="1">

                    <label>Tempo (min)</label>
                    <input type="number" id="c-tempo">

                    <label>Custo/Hora</label>
                    <input type="number" id="c-hora">

                    <label>Extras</label>
                    <input type="number" id="c-extra">

                    <label>Margem (%)</label>
                    <input type="number" id="c-margem" value="100">

                    <label>Taxa (%)</label>
                    <input type="number" id="c-tax">

                    <button class="btn-p" onclick="calcularPreco()">CALCULAR</button>
                </div>

                <div class="res-display">
                    <p>PREÇO FINAL</p>
                    <h1 id="res-total">R$ 0,00</h1>
                </div>
            </div>
        </div>
    </section>

    <!-- GERADOR DE FOTOS -->
    <section id="tab-fotos" class="tab-content">
        <div class="card">

            <div class="controls">
                <select id="f-formato">
                    <option value="p-padrao">Polaroid Padrão</option>
                    <option value="p-instax">Instax</option>
                    <option value="p-mini">Polaroid Mini</option>
                    <option value="p-cabine">Cabine (5x15)</option>
                </select>

                <input type="file" id="f-input" multiple accept="image/*" hidden>

                <button class="btn-s" onclick="document.getElementById('f-input').click()">📂 Subir Imagens</button>
                <button class="btn-p" onclick="baixarPNG()">📥 Baixar PNG</button>
            </div>

            <div id="print-area">
                <div id="preview-area"></div>
            </div>

        </div>
    </section>

    <!-- PDV -->
    <section id="tab-pdv" class="tab-content">
        <div class="card">

            <input type="text" id="r-cli" placeholder="Cliente">
            <input type="text" id="r-item" placeholder="Produto">
            <input type="number" id="r-val" placeholder="Valor">

            <button class="btn-p" onclick="gerarRecibo()">Gerar Recibo</button>

            <div id="recibo-view">
                <h3>NOSTÁLGICAS</h3>
                <pre id="v-txt">Aguardando dados...</pre>
            </div>

        </div>
    </section>

    <!-- REMOVER FUNDO -->
    <section id="tab-bg" class="tab-content">
        <div class="card">

            <input type="file" id="bg-in" hidden>

            <button class="btn-p" onclick="document.getElementById('bg-in').click()">
                Remover Fundo
            </button>

            <div id="bg-status"></div>

            <canvas id="bg-canvas"></canvas>

        </div>
    </section>

</main>

<!-- SCRIPTS -->
<script src="precessor.js"></script>
<script src="estudio.js"></script>
<script src="pdv.js"></script>
<script src="bg-remover.js"></script>

<script>
function showTab(e, id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

    document.getElementById('tab-'+id).classList.add('active');
    e.target.classList.add('active');
}
</script>

</body>
</html>
