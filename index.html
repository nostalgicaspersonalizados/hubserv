<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Hub - Gestão Profissional</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@latest/dist/bundle.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body id="main-body">

<div id="auth-screen">
    <div class="card" style="width: 320px; text-align: center;">
        <h2 style="margin-bottom: 20px;">Nostálgicas Hub</h2>
        <input type="email" id="auth-email" placeholder="E-mail">
        <input type="password" id="auth-senha" placeholder="Senha" style="margin-top:10px;">
        <button class="btn" onclick="handleAuth('login')" style="margin-top:15px; width:100%">ENTRAR</button>
        <p id="auth-msg" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<aside class="sidebar">
    <div class="logo">NOSTÁLGICAS</div>
    <button class="nav-item" onclick="tab('calc', this)">💰 Precificador</button>
    <button class="nav-item active" onclick="tab('prod', this)">🖨️ Estúdio Fotos</button>
    <button class="nav-item" onclick="tab('pdv', this)">🧾 PDV / Recibo</button>
    <button class="nav-item" onclick="tab('bg-rem', this)">✂️ Remover Fundo</button>
    <button class="nav-item" onclick="logout()" style="margin-top:auto; color:#f87171;">🚪 Sair</button>
</aside>

<main class="main">
    
    <div id="aba-prod" class="aba ativa">
        <div class="card">
            <h2>Estúdio de Montagem</h2>
            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px;">
                <select id="p-modelo" onchange="limparEstudio()">
                    <option value="padrao">Polaroid (9,5x10)</option>
                    <option value="mini">Mini (7x9)</option>
                    <option value="instax">Instax (5,5x8)</option>
                    <option value="trio">Trio Cabine (5x15)</option>
                </select>
                <button class="btn" onclick="document.getElementById('f-in').click()">📂 Selecionar Fotos</button>
                <button class="btn" style="background:var(--dark)" onclick="exportarPDF()">📄 Gerar PDF</button>
            </div>
            <input type="file" id="f-in" multiple hidden>
        </div>
        <div id="p-folhas"></div>
    </div>

    <div id="aba-calc" class="aba">
        <div class="card">
            <h2>💰 Calculadora de Custos</h2>
            <div style="display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 25px;">
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <div id="materiais-lista">
                        <label><strong>Materiais / Insumos</strong></label>
                        <div class="material-row" style="display: flex; gap: 5px; margin-bottom: 8px;">
                            <input type="text" placeholder="Papel, Tinta, etc" class="mat-nome">
                            <input type="number" placeholder="R$" class="mat-valor" style="width: 100px;">
                            <button class="btn" onclick="addMaterialField()" style="width: 40px; background: var(--dark)">+</button>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div><label>Custos Fixos (R$)</label><input type="number" id="calc-fixo"></div>
                        <div><label>Horas/Mês</label><input type="number" id="calc-horas-mes" value="160"></div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div><label>Margem (%)</label><input type="number" id="calc-margem" value="100"></div>
                        <div><label>Tempo (HH:MM)</label>
                            <div style="display: flex; gap: 5px;">
                                <input type="number" id="t-hh" value="0">
                                <input type="number" id="t-mm" value="0">
                            </div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn" onclick="processarCalculo()" style="flex: 2;">CALCULAR</button>
                        <button class="btn" onclick="copiarCalculo()" style="flex: 1; background: var(--dark);">📋 COPIAR</button>
                    </div>
                </div>
                <div id="resultado-box" style="background: #f1f5f9; padding: 25px; border-radius: 15px; border: 2px dashed #cbd5e1;">
                    <h3>Resumo</h3>
                    <div id="detalhes-final">Aguardando dados...</div>
                    <h1 id="preco-venda-final" style="color: var(--primary); font-size: 2rem;">R$ 0,00</h1>
                </div>
            </div>
        </div>
    </div>

    <div id="aba-pdv" class="aba">
        <div class="card">
            <h2>🧾 Recibo Rápido</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px;">
                <div>
                    <input type="text" id="pdv-cliente" placeholder="Nome do Cliente">
                    <div style="display: flex; gap: 5px; margin: 10px 0;">
                        <input type="text" id="pdv-item" placeholder="Produto">
                        <input type="number" id="pdv-valor" placeholder="R$" style="width: 80px;">
                        <button class="btn" onclick="adicionarItem()">+</button>
                    </div>
                    <button class="btn" style="background: var(--dark); width: 100%;" onclick="gerarReciboPDF()">📄 GERAR PDF</button>
                </div>
                <div id="recibo-preview" style="background: #fff; border: 1px dashed #ccc; padding: 15px;">
                    <h3 style="text-align: center;">NOSTÁLGICAS</h3>
                    <p id="preview-cliente">Cliente: ---</p>
                    <table id="tabela-itens" style="width: 100%; font-size: 13px;">
                        <thead><tr><th>Item</th><th>Valor</th></tr></thead>
                        <tbody></tbody>
                    </table>
                    <div style="text-align: right; font-weight: bold; margin-top: 10px;">Total: <span id="preview-total">R$ 0,00</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="aba-bg-rem" class="aba">
        <div class="card" style="text-align: center;">
            <h2>✂️ Remover Fundo</h2>
            <input type="file" id="f-remove" accept="image/*" hidden onchange="processarRemocao()">
            <button class="btn" onclick="document.getElementById('f-remove').click()">📂 Selecionar Imagem</button>
            <div id="loading-remove" style="display: none; margin-top: 20px;"><div class="spinner"></div><p>Removendo fundo...</p></div>
            <div id="result-area" style="display: none; margin-top: 20px;">
                <canvas id="canvas-remove" style="max-width: 100%; background: url('https://www.transparenttextures.com/patterns/checkerboard.png');"></canvas>
                <br><button class="btn" style="background: var(--dark); margin-top: 10px;" onclick="baixarImagemSemFundo()">💾 Baixar PNG</button>
            </div>
        </div>
    </div>
</main>

<div id="editor-modal">
    <div class="modal-content" style="background:white; padding:20px; border-radius:12px; width:540px; margin: auto; position:relative; top:50%; transform:translateY(-50%);">
        <h3>Ajustar Foto</h3>
        <div id="crop-area" style="width:500px; height:500px; background:#000; overflow:hidden; position:relative;">
            <img src="" id="crop-img" style="position:absolute; cursor:move;">
        </div>
        <input type="range" id="zoom-ctrl" min="0.1" max="3" step="0.01" value="0.8" style="width:100%; margin:15px 0;">
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="background:#64748b; flex: 1;" onclick="closeEditor()">CANCELAR</button>
            <button class="btn" style="flex: 1;" onclick="saveCrop()">SALVAR</button>
        </div>
    </div>
</div>

<script src="estudio.js"></script>
<script src="precificador.js"></script>
<script src="pdv.js"></script>
<script src="bg-remover.js"></script>

<script>
    function tab(id, el) {
        document.querySelectorAll('.aba').forEach(aba => {
            aba.classList.remove('ativa');
            aba.style.display = 'none';
        });
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));

        const abaAlvo = document.getElementById('aba-' + id);
        if (abaAlvo) {
            abaAlvo.classList.add('ativa');
            abaAlvo.style.display = 'block';
        }
        if (el) el.classList.add('active');
    }
</script>

<script type="module" src="auth.js"></script>

</body>
</html>
